site_name: "promptforge \u2014 Documentation"
site_description: Auto-generated by DocsForge
theme:
  name: material
  palette:
  - scheme: slate
    primary: deep purple
    accent: purple
  features:
  - navigation.tabs
  - navigation.sections
  - content.code.copy
nav:
- Home: index.md
- Architecture: architecture.md
- Api: api.md
- Getting Started: getting-started.md
- Changelog: changelog.md
- Setup: setup.md
markdown_extensions:
- fenced_code
- tables
- admonition
- codehilite
- toc:
    permalink: true
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format
